<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            width: 280px;
            padding: 16px;
            margin: 0;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        h1 {
            font-size: 18px;
            margin: 0 0 12px 0;
            color: #ffffff;
        }
        .stat {
            background: #16213e;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #667eea;
        }
        .status {
            font-size: 12px;
            color: #4caf50;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <h1>Hello World</h1>
    <div class="stat">
        <div class="stat-label">Pages Visited</div>
        <div class="stat-value" id="count">—</div>
    </div>
    <div class="status">Extension active</div>
    <script src="popup.js"></script>
</body>
</html>
