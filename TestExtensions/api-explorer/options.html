<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>API Explorer Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      color: #222;
    }
    h1 { font-size: 20px; margin-bottom: 16px; }
    label { display: block; margin: 12px 0 4px; font-weight: 500; }
    input[type="text"] {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      margin-top: 16px;
      padding: 8px 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #1d4ed8; }
    #status {
      margin-top: 12px;
      color: #16a34a;
      display: none;
    }
  </style>
</head>
<body>
  <h1>API Explorer Options</h1>
  <label for="display-name">Display Name</label>
  <input type="text" id="display-name" placeholder="API Explorer">
  <button id="save">Save</button>
  <div id="status">Settings saved.</div>
  <pre id="diag" style="margin-top:20px; padding:10px; background:#f0f0f0; border-radius:4px; font-size:12px; white-space:pre-wrap;"></pre>
  <script src="options.js"></script>
</body>
</html>
