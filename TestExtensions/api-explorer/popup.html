<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>API Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 440px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      padding: 12px;
      color: #222;
    }
    h1 { font-size: 16px; margin-bottom: 10px; }
    h2 { font-size: 13px; margin: 12px 0 6px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
    section { border-bottom: 1px solid #eee; padding-bottom: 8px; }
    section:last-child { border-bottom: none; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { background: #1d4ed8; }
    button.secondary { background: #6b7280; }
    button.secondary:hover { background: #4b5563; }
    input[type="text"], input[type="number"] {
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      width: 120px;
    }
    .row { display: flex; align-items: center; gap: 6px; margin: 4px 0; flex-wrap: wrap; }
    .result {
      margin-top: 4px;
      padding: 6px 8px;
      background: #f5f5f5;
      border-radius: 4px;
      font-family: "SF Mono", Menlo, monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 160px;
      overflow-y: auto;
      display: none;
    }
    .result.visible { display: block; }
    .result.error { color: #dc2626; background: #fef2f2; }
    #event-log .result { max-height: 240px; }
    .badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <h1>API Explorer <span class="badge">v2</span></h1>

  <!-- i18n -->
  <section>
    <h2>i18n</h2>
    <div class="row">
      <button id="btn-i18n-info">Get i18n Info</button>
      <button id="btn-i18n-local" class="secondary">Local getMessage</button>
    </div>
    <div class="result" id="res-i18n"></div>
  </section>

  <!-- Query All Tabs -->
  <section>
    <h2>Tab List</h2>
    <div class="row">
      <button id="btn-query-all">Query All Tabs</button>
    </div>
    <div class="result" id="res-query-all"></div>
  </section>

  <!-- Active Tab -->
  <section>
    <h2>Active Tab</h2>
    <div class="row">
      <button id="btn-active-tab">Active Tab</button>
    </div>
    <div class="result" id="res-active-tab"></div>
  </section>

  <!-- Create Tab -->
  <section>
    <h2>Create Tab</h2>
    <div class="row">
      <input type="text" id="input-create-url" placeholder="https://example.com">
      <button id="btn-create-tab">Create</button>
    </div>
    <div class="result" id="res-create-tab"></div>
  </section>

  <!-- Close Tab -->
  <section>
    <h2>Close Tab</h2>
    <div class="row">
      <input type="number" id="input-close-id" placeholder="Tab ID">
      <button id="btn-close-tab">Close</button>
    </div>
    <div class="result" id="res-close-tab"></div>
  </section>

  <!-- Detect Language -->
  <section>
    <h2>Detect Language</h2>
    <div class="row">
      <input type="number" id="input-detect-id" placeholder="Tab ID">
      <button id="btn-detect-lang">Detect</button>
    </div>
    <div class="result" id="res-detect-lang"></div>
  </section>

  <!-- Execute Script -->
  <section>
    <h2>Execute Script</h2>
    <div class="row">
      <input type="number" id="input-exec-id" placeholder="Tab ID">
      <button id="btn-exec-script">Run inject.js</button>
    </div>
    <div class="result" id="res-exec-script"></div>
  </section>

  <!-- Insert CSS -->
  <section>
    <h2>Insert CSS</h2>
    <div class="row">
      <input type="number" id="input-css-id" placeholder="Tab ID">
      <button id="btn-insert-css">Insert inject.css</button>
    </div>
    <div class="result" id="res-insert-css"></div>
  </section>

  <!-- Send to Tab -->
  <section>
    <h2>Send to Tab</h2>
    <div class="row">
      <input type="number" id="input-send-id" placeholder="Tab ID">
      <button id="btn-send-tab">Send highlight</button>
    </div>
    <div class="result" id="res-send-tab"></div>
  </section>

  <!-- Context Menus -->
  <section>
    <h2>Context Menus</h2>
    <div class="row">
      <input type="text" id="input-menu-title" placeholder="Menu item title" style="width:180px">
      <button id="btn-create-menu">Create</button>
      <button id="btn-remove-menus" class="secondary">Remove All</button>
    </div>
    <div class="result" id="res-context-menus"></div>
  </section>

  <!-- Offscreen Document -->
  <section>
    <h2>Offscreen Document</h2>
    <div class="row">
      <button id="btn-offscreen-create">Create</button>
      <button id="btn-offscreen-has" class="secondary">Has?</button>
      <button id="btn-offscreen-close" class="secondary">Close</button>
    </div>
    <div class="result" id="res-offscreen"></div>
  </section>

  <!-- Port Messaging -->
  <section>
    <h2>Port Messaging</h2>
    <div class="row">
      <input type="text" id="input-port-msg" placeholder="Message to send" style="width:180px">
      <button id="btn-port-send">Connect & Send</button>
    </div>
    <div class="result" id="res-port"></div>
  </section>

  <!-- Runtime Info -->
  <section>
    <h2>Runtime Info</h2>
    <div class="row">
      <button id="btn-platform-info">Platform Info</button>
      <button id="btn-bg-page" class="secondary">getBackgroundPage</button>
    </div>
    <div class="result" id="res-runtime-info"></div>
  </section>

  <!-- Open Options Page -->
  <section>
    <h2>Options Page</h2>
    <div class="row">
      <button id="btn-open-options">Open Options Page</button>
    </div>
    <div class="result" id="res-options-page"></div>
  </section>

  <!-- Storage onChanged -->
  <section>
    <h2>Storage onChanged</h2>
    <div class="row">
      <input type="text" id="input-storage-val" placeholder="Value to write" style="width:180px">
      <button id="btn-storage-write">Write & Watch</button>
    </div>
    <div class="result" id="res-storage-changed"></div>
  </section>

  <!-- Event Log -->
  <section id="event-log">
    <h2>Event Log</h2>
    <div class="row">
      <button id="btn-refresh-log">Refresh Log</button>
    </div>
    <div class="result" id="res-event-log"></div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
