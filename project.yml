name: Detour
options:
  deploymentTarget:
    macOS: "15.4"
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"
targets:
  Detour:
    type: application
    platform: macOS
    sources:
      - Detour
    dependencies:
      - package: GRDB
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.detourbrowser.mac
        INFOPLIST_FILE: Detour/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Detour/Resources/Detour.entitlements
        DEVELOPMENT_TEAM: 58MN2R524R
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: YES
        OTHER_CODE_SIGN_FLAGS: "--timestamp"
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "15.4"
  DetourTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - DetourTests
    dependencies:
      - target: Detour
      - package: GRDB
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "15.4"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Detour.app/Contents/MacOS/Detour"
        BUNDLE_LOADER: "$(TEST_HOST)"
        DEVELOPMENT_TEAM: 58MN2R524R
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual
    info:
      path: DetourTests/Info.plist
      properties:
        NSPrincipalClass: TestEnvironmentSetup
schemes:
  Detour:
    build:
      targets:
        Detour: all
    run:
      config: Debug
  DetourTests:
    build:
      targets:
        Detour: all
        DetourTests: [test]
    test:
      config: Debug
      environmentVariables:
        DETOUR_DATA_DIR: DetourTests
      targets:
        - DetourTests
