name: Detour
options:
  deploymentTarget:
    macOS: "14.0"
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
targets:
  Detour:
    type: application
    platform: macOS
    sources:
      - Detour
    dependencies:
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.detour.app
        INFOPLIST_FILE: Detour/Resources/Info.plist
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
  DetourTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - DetourTests
    dependencies:
      - target: Detour
      - package: GRDB
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Detour.app/Contents/MacOS/Detour"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: DetourTests/Info.plist
      properties:
        NSPrincipalClass: TestEnvironmentSetup
schemes:
  Detour:
    build:
      targets:
        Detour: all
    run:
      config: Debug
  DetourTests:
    build:
      targets:
        Detour: all
        DetourTests: [test]
    test:
      config: Debug
      environmentVariables:
        DETOUR_DATA_DIR: DetourTests
      targets:
        - DetourTests
